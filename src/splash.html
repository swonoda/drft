<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>DRFTを起動中</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #f7f9fd;
        border: 1px solid #e1e6f0;
        border-radius: 18px;
        -webkit-app-region: drag;
      }
      img {
        width: 112px;
        height: 112px;
        border-radius: 28px;
      }
    </style>
  </head>
  <body>
    <img src="../build/icon.png" alt="DRFT" />
  </body>
</html>
